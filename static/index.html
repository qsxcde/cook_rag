<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>食谱 RAG · 本地菜谱问答</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #141210;
      --surface: #1e1a17;
      --surface-2: #26211d;
      --border: #3a332c;
      --text: #f2ebe6;
      --muted: #9a8f86;
      --accent: #e4a04a;
      --accent-hover: #f0b45e;
      --danger: #c97a6a;
      --user-bg: #2d2620;
      --bot-bg: #181512;
      --radius: 12px;
      --sidebar-width: 260px;
    }
    *, *::before, *::after { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
    }
    body {
      font-family: "Noto Sans SC", "PingFang SC", system-ui, sans-serif;
      background: radial-gradient(ellipse 100% 70% at 50% -15%, #2d241c 0%, var(--bg) 52%);
      color: var(--text);
      line-height: 1.5;
    }
    .app-container {
      display: flex;
      height: 100vh;
    }
    .sidebar {
      width: var(--sidebar-width);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }
    .sidebar-header {
      padding: 1rem;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-header h1 {
      font-size: 1.1rem;
      font-weight: 600;
      margin: 0 0 0.5rem 0;
      letter-spacing: 0.04em;
    }
    .new-chat-btn {
      width: 100%;
      font: inherit;
      font-weight: 500;
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: linear-gradient(165deg, var(--accent) 0%, #c4852e 100%);
      color: #1a1208;
    }
    .new-chat-btn:hover:not(:disabled) {
      background: linear-gradient(165deg, var(--accent-hover) 0%, #d6963a 100%);
    }
    .new-chat-btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .sidebar-content {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem;
    }
    .sidebar-content::-webkit-scrollbar {
      width: 6px;
    }
    .sidebar-content::-webkit-scrollbar-track {
      background: var(--bot-bg);
      border-radius: 3px;
    }
    .sidebar-content::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }
    .session-item {
      padding: 0.6rem 0.75rem;
      margin-bottom: 0.25rem;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: background 0.15s, border-color 0.15s;
      position: relative;
    }
    .session-item:hover {
      background: var(--surface-2);
      border-color: var(--border);
    }
    .session-item.active {
      background: var(--surface-2);
      border-color: var(--accent);
    }
    .session-title {
      font-size: 0.85rem;
      color: var(--text);
      margin: 0 0 0.2rem 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding-right: 40px;
    }
    .session-info {
      font-size: 0.7rem;
      color: var(--muted);
      margin: 0;
    }
    .session-delete {
      position: absolute;
      right: 0.5rem;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      padding: 0.25rem 0.4rem;
      border-radius: 4px;
      font-size: 0.8rem;
    }
    .session-delete:hover {
      background: rgba(201, 122, 106, 0.2);
      color: var(--danger);
    }
    .main-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    header {
      text-align: center;
      padding: 0.75rem 1rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    header .sub {
      margin: 0;
      color: var(--muted);
      font-size: 0.75rem;
    }
    .status {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      margin-top: 0.4rem;
      padding: 0.2rem 0.5rem;
      font-size: 0.7rem;
      border-radius: 999px;
      background: var(--surface-2);
      border: 1px solid var(--border);
      color: var(--muted);
    }
    .status.ready { color: #8fd49a; border-color: #2a4a32; }
    .status.err { color: #f0b0a8; border-color: #5a3530; }
    .panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      margin: 1rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,0.4);
      min-height: 0;
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0.75rem;
      background: var(--surface-2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .toolbar button {
      font: inherit;
      font-size: 0.78rem;
      padding: 0.3rem 0.65rem;
      border-radius: 8px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: #2a2520;
      color: var(--text);
    }
    .toolbar button:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    .toolbar button.danger { border-color: #5a3530; color: #f0b0a8; }
    .toolbar label {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.78rem;
      color: var(--muted);
      user-select: none;
      margin-left: auto;
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1rem 0.75rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      min-height: 0;
    }
    #messages::-webkit-scrollbar {
      width: 6px;
    }
    #messages::-webkit-scrollbar-track {
      background: var(--bot-bg);
      border-radius: 3px;
    }
    #messages::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 3px;
    }
    #messages::-webkit-scrollbar-thumb:hover {
      background: #4a433c;
    }
    .empty-hint {
      margin: auto;
      padding: 1.5rem 1rem;
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      max-width: 22rem;
    }
    .empty-hint strong { color: var(--text); font-weight: 500; }
    .msg {
      max-width: 94%;
      padding: 0.65rem 0.9rem;
      border-radius: var(--radius);
      font-size: 0.9rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: var(--user-bg);
      border: 1px solid var(--border);
    }
    .msg.bot {
      align-self: flex-start;
      background: var(--bot-bg);
      border: 1px solid #252018;
    }
    .msg.bot.loading { color: var(--muted); }
    .composer {
      padding: 0.65rem 0.75rem 0.75rem;
      border-top: 1px solid var(--border);
      background: #1a1613;
      flex-shrink: 0;
    }
    .composer textarea {
      width: 100%;
      min-height: 44px;
      max-height: 120px;
      resize: vertical;
      padding: 0.55rem 0.7rem;
      margin-bottom: 0.5rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: #12100e;
      color: var(--text);
      font: inherit;
      font-size: 0.88rem;
    }
    .composer textarea:focus {
      outline: 2px solid rgba(228, 160, 74, 0.35);
      outline-offset: 1px;
      border-color: var(--accent);
    }
    .composer .row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
    }
    .composer .primary {
      font: inherit;
      font-weight: 500;
      padding: 0.45rem 1.1rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: linear-gradient(165deg, var(--accent) 0%, #c4852e 100%);
      color: #1a1208;
    }
    .composer .primary:hover:not(:disabled) {
      background: linear-gradient(165deg, var(--accent-hover) 0%, #d6963a 100%);
    }
    .composer .primary:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }
    footer {
      text-align: center;
      padding: 0.5rem;
      font-size: 0.68rem;
      color: var(--muted);
      flex-shrink: 0;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }
    .visually-hidden { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); border: 0; }
  </style>
</head>
<body>
  <div class="app-container">
    <aside class="sidebar" aria-label="历史对话">
      <div class="sidebar-header">
        <h1>食谱 RAG</h1>
        <button class="new-chat-btn" id="newChatBtn">+ 新建对话</button>
      </div>
      <div class="sidebar-content" id="sessionList">
      </div>
    </aside>

    <div class="main-content">
      <header>
        <p class="sub">基于本地 <code style="font-size:0.85em">data/</code> Markdown 菜谱 · 向量 + BM25 混合检索</p>
        <div id="statusEl" class="status" role="status" aria-live="polite">正在连接服务…</div>
      </header>

      <main class="panel" aria-label="对话区">
        <div class="toolbar">
          <button type="button" id="clearBtn" disabled title="清空当前会话显示">清空对话</button>
          <button type="button" id="stopBtn" class="danger" disabled title="中止正在生成的回答">停止生成</button>
          <label title="关闭后一次性返回完整回答，适合列表类问题">
            <input type="checkbox" id="stream" checked />
            流式输出
          </label>
        </div>
        <div id="messages" aria-live="polite" aria-relevant="additions"></div>
        <div class="composer">
          <label for="q" class="visually-hidden">输入问题</label>
          <textarea id="q" rows="2" placeholder="例如：白灼虾怎么做？推荐几道简单的素菜" autocomplete="off"></textarea>
          <div class="row">
            <button type="button" class="primary" id="send" disabled>发送</button>
          </div>
        </div>
      </main>

      <footer>POST /api/chat · GET /api/health</footer>
    </div>
  </div>

  <script>
    (function () {
      const messages = document.getElementById("messages");
      const q = document.getElementById("q");
      const sendBtn = document.getElementById("send");
      const stopBtn = document.getElementById("stopBtn");
      const clearBtn = document.getElementById("clearBtn");
      const streamCb = document.getElementById("stream");
      const statusEl = document.getElementById("statusEl");
      const sessionList = document.getElementById("sessionList");
      const newChatBtn = document.getElementById("newChatBtn");

      let streamAbort = null;
      let currentSessionId = null;

      function formatDetail(detail) {
        if (detail == null) return "";
        if (typeof detail === "string") return detail;
        if (Array.isArray(detail)) {
          return detail.map(function (x) {
            if (typeof x === "string") return x;
            if (x && x.msg) return x.msg;
            return JSON.stringify(x);
          }).join("; ");
        }
        return String(detail);
      }

      function formatTimestamp(ts) {
        const d = new Date(ts * 1000);
        const now = new Date();
        const diff = now - d;
        if (diff < 60000) return "刚刚";
        if (diff < 3600000) return Math.floor(diff / 60000) + "分钟前";
        if (diff < 86400000) return Math.floor(diff / 3600000) + "小时前";
        if (diff < 604800000) return Math.floor(diff / 86400000) + "天前";
        return d.toLocaleDateString("zh-CN");
      }

      function ensureEmptyHint() {
        if (messages.querySelector(".msg")) return;
        if (messages.querySelector(".empty-hint")) return;
        const el = document.createElement("div");
        el.className = "empty-hint";
        el.innerHTML = "<strong>开始提问</strong><br />Enter 发送，Shift+Enter 换行。流式生成时可点「停止生成」。";
        messages.appendChild(el);
      }

      function removeEmptyHint() {
        const h = messages.querySelector(".empty-hint");
        if (h) h.remove();
      }

      function addMsg(role, text, extraClass) {
        removeEmptyHint();
        const div = document.createElement("div");
        div.className = "msg " + role + (extraClass ? " " + extraClass : "");
        div.textContent = text;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
        return div;
      }

      function clearMessages() {
        messages.innerHTML = "";
        ensureEmptyHint();
      }

      async function pollHealth() {
        try {
          const r = await fetch("/api/health");
          const d = await r.json();
          if (d.error) {
            statusEl.textContent = "初始化失败: " + d.error;
            statusEl.className = "status err";
            sendBtn.disabled = true;
            newChatBtn.disabled = true;
            return;
          }
          if (d.ready) {
            const s = d.stats || {};
            const n = s.total_documents != null ? s.total_documents : "?";
            const c = s.total_chunks != null ? s.total_chunks : "?";
            statusEl.textContent = "就绪 · 菜谱 " + n + " 篇 · 分块 " + c;
            statusEl.className = "status ready";
            sendBtn.disabled = false;
            newChatBtn.disabled = false;
            clearBtn.disabled = false;
            loadSessionList();
          } else {
            statusEl.textContent = "知识库加载中…（首次会建索引，请稍候）";
            statusEl.className = "status";
            sendBtn.disabled = true;
            newChatBtn.disabled = true;
            clearBtn.disabled = true;
            setTimeout(pollHealth, 2000);
          }
        } catch (e) {
          statusEl.textContent = "无法连接后端，请确认已运行 uvicorn web_server:app";
          statusEl.className = "status err";
          sendBtn.disabled = true;
          newChatBtn.disabled = true;
        }
      }

      async function loadSessionList() {
        try {
          const r = await fetch("/api/sessions");
          const d = await r.json();
          renderSessionList(d.sessions || []);
        } catch (e) {
          console.error("加载会话列表失败:", e);
        }
      }

      function renderSessionList(sessions) {
        sessionList.innerHTML = "";
        if (!sessions.length) {
          const el = document.createElement("div");
          el.style.padding = "1rem";
          el.style.color = "var(--muted)";
          el.style.fontSize = "0.8rem";
          el.textContent = "暂无历史对话";
          sessionList.appendChild(el);
          return;
        }
        sessions.forEach(function (session) {
          const item = document.createElement("div");
          item.className = "session-item" + (session.session_id === currentSessionId ? " active" : "");
          
          const firstMessage = session.message_count > 0 ? "新对话" : "空对话";
          
          item.innerHTML = `
            <p class="session-title">${firstMessage}</p>
            <p class="session-info">${session.message_count} 条消息 · ${formatTimestamp(session.updated_at)}</p>
            <button class="session-delete" data-id="${session.session_id}">×</button>
          `;
          
          item.addEventListener("click", function (e) {
            if (e.target.classList.contains("session-delete")) {
              e.stopPropagation();
              deleteSession(session.session_id);
              return;
            }
            loadSession(session.session_id);
          });
          
          sessionList.appendChild(item);
        });
      }

      async function loadSession(sessionId) {
        try {
          const r = await fetch("/api/sessions/" + sessionId);
          const d = await r.json();
          currentSessionId = sessionId;
          clearMessages();
          d.messages.forEach(function (msg) {
            addMsg(msg.role, msg.content);
          });
          renderSessionList(await fetch("/api/sessions").then(r => r.json()).then(d => d.sessions || []));
        } catch (e) {
          console.error("加载会话失败:", e);
        }
      }

      async function createNewSession() {
        try {
          const r = await fetch("/api/sessions", { method: "POST" });
          const d = await r.json();
          currentSessionId = d.session_id;
          clearMessages();
          loadSessionList();
        } catch (e) {
          console.error("创建会话失败:", e);
        }
      }

      async function deleteSession(sessionId) {
        if (!confirm("确定要删除这个对话吗？")) return;
        try {
          await fetch("/api/sessions/" + sessionId, { method: "DELETE" });
          if (sessionId === currentSessionId) {
            currentSessionId = null;
            clearMessages();
          }
          loadSessionList();
        } catch (e) {
          console.error("删除会话失败:", e);
        }
      }

      async function send() {
        const text = q.value.trim();
        if (!text || sendBtn.disabled) return;
        removeEmptyHint();
        addMsg("user", text);
        q.value = "";
        sendBtn.disabled = true;
        streamCb.disabled = true;
        stopBtn.disabled = false;

        const useStream = streamCb.checked;

        if (!useStream) {
          const bot = addMsg("bot", "…", "loading");
          try {
            const r = await fetch("/api/chat", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ 
                question: text, 
                stream: false,
                session_id: currentSessionId
              }),
            });
            const data = await r.json().catch(function () { return {}; });
            if (!r.ok) throw new Error(formatDetail(data.detail) || r.statusText);
            bot.textContent = data.answer || "";
            bot.classList.remove("loading");
            if (data.session_id) {
              currentSessionId = data.session_id;
              loadSessionList();
            }
          } catch (e) {
            bot.textContent = "错误: " + (e && e.message ? e.message : e);
            bot.classList.remove("loading");
          }
          sendBtn.disabled = false;
          streamCb.disabled = false;
          stopBtn.disabled = true;
          return;
        }

        const bot = addMsg("bot", "", "loading");
        bot.textContent = "";
        streamAbort = new AbortController();
        try {
          const r = await fetch("/api/chat", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ 
              question: text, 
              stream: true,
              session_id: currentSessionId
            }),
            signal: streamAbort.signal,
          });
          if (!r.ok) {
            const err = await r.json().catch(function () { return {}; });
            throw new Error(formatDetail(err.detail) || r.statusText);
          }
          bot.classList.remove("loading");
          const reader = r.body.getReader();
          const dec = new TextDecoder();
          for (;;) {
            const x = await reader.read();
            if (x.done) break;
            bot.textContent += dec.decode(x.value, { stream: true });
            messages.scrollTop = messages.scrollHeight;
          }
          loadSessionList();
        } catch (e) {
          if (e && e.name === "AbortError") {
            bot.textContent = (bot.textContent || "") + "\n\n[已停止]";
            bot.classList.remove("loading");
          } else {
            bot.textContent = "错误: " + (e && e.message ? e.message : e);
            bot.classList.remove("loading");
          }
        }
        streamAbort = null;
        sendBtn.disabled = false;
        streamCb.disabled = false;
        stopBtn.disabled = true;
      }

      sendBtn.addEventListener("click", send);
      q.addEventListener("keydown", function (e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          send();
        }
      });

      clearBtn.addEventListener("click", clearMessages);
      newChatBtn.addEventListener("click", createNewSession);
      
      stopBtn.addEventListener("click", function () {
        if (streamAbort) {
          streamAbort.abort();
          streamAbort = null;
        }
        stopBtn.disabled = true;
      });

      ensureEmptyHint();
      pollHealth();
    })();
  </script>
</body>
</html>
